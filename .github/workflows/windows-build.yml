name: Build Windows EXE

on:
  push:
    branches: [main]
    paths:
      - 'invoice_tool/invoice_extractor.py'
      - 'invoice_tool/invoice_extractor_windows.spec'
      - 'invoice_tool/requirements.txt'
      - '.github/workflows/windows-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Download and bundle 7z standalone
        run: |
          # Windows runner 自带 7z.exe，直接用它解压 extra 包
          New-Item -ItemType Directory -Force -Path invoice_tool\7z
          curl -L -o invoice_tool\7z\7z.exe https://7-zip.org/a/7z2301.exe
          .\invoice_tool\7z\7z.exe x .\invoice_tool\7z\7z.exe -oinvoice_tool\7z -y
          del invoice_tool\7z\7z.exe

      - name: Verify 7z.exe
        run: |
          if exist invoice_tool\7z\7z.exe (
            echo SUCCESS: 7z.exe found
            dir invoice_tool\7z\
          ) else (
            echo FAIL: 7z.exe not found
            dir invoice_tool\7z\
            exit /b 1
          )

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r invoice_tool\requirements.txt

      - name: Build EXE
        run: pyinstaller invoice_tool\invoice_extractor_windows.spec --noconfirm --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: invoice-tool-win-${{ github.run_number }}
          path: invoice_tool/dist/InvoiceTool.exe
          retention-days: 14
