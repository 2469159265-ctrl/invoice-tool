name: Build Windows EXE

on:
  push:
    branches: [main]
    paths:
      - 'invoice_tool/invoice_extractor.py'
      - 'invoice_tool/invoice_extractor_windows.spec'
      - 'invoice_tool/requirements.txt'
      - '.github/workflows/windows-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Download and extract 7z standalone
        shell: bash
        run: |
          # Windows runner 自带 7z，用它解压 extra 包得到真正可执行文件
          mkdir -p invoice_tool/7z
          curl -L -o invoice_tool/7z/7z.exe https://7-zip.org/a/7z2301.exe
          7z x invoice_tool/7z/7z.exe -oinvoice_tool/7z -y
          rm invoice_tool/7z/7z.exe
          ls -la invoice_tool/7z/

      - name: Verify 7z.exe
        run: ls -la invoice_tool/7z/7z.exe || exit 1

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r invoice_tool/requirements.txt

      - name: Build EXE
        run: pyinstaller invoice_tool/invoice_extractor_windows.spec --noconfirm --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: invoice-tool-win-${{ github.run_number }}
          path: invoice_tool/dist/InvoiceTool.exe
          retention-days: 14
