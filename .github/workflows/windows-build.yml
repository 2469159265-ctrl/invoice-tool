name: Build Windows EXE

on:
  push:
    branches: [main]
    paths:
      - 'invoice_tool/invoice_extractor.py'
      - 'invoice_tool/invoice_extractor_windows.spec'
      - 'invoice_tool/requirements.txt'
      - '.github/workflows/windows-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Bundle 7z from runner's own installation
        run: |
          # Windows runner 自带 7z.exe，直接复制出来打包
          $runner7z = "${env:ProgramFiles}\7-Zip\7z.exe"
          if (-not (Test-Path $runner7z)) {
            $runner7z = "${env:ProgramFiles(x86)}\7-Zip\7z.exe"
          }
          if (Test-Path $runner7z) {
            New-Item -ItemType Directory -Force -Path invoice_tool\7z | Out-Null
            Copy-Item $runner7z "invoice_tool\7z\7z.exe"
            Write-Host "SUCCESS: bundled 7z.exe from runner"
          } else {
            Write-Host "WARNING: no system 7z found, trying download..."
            # 兜底下载（某些 runner 镜像没有预装 7z）
            Invoke-WebRequest -Uri "https://7-zip.org/a/7z2301.exe" -OutFile "invoice_tool\7z\7z.exe" -UseBasicParsing
          }

      - name: Verify 7z.exe
        run: |
          if (Test-Path "invoice_tool\7z\7z.exe") {
            Write-Host "OK: invoice_tool\7z\7z.exe"
          } else {
            Write-Host "FAIL: 7z.exe missing"
            exit 1
          }

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r invoice_tool/requirements.txt

      - name: Build EXE
        run: pyinstaller invoice_tool/invoice_extractor_windows.spec --noconfirm --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: invoice-tool-win-${{ github.run_number }}
          path: invoice_tool/dist/InvoiceTool.exe
          retention-days: 14
