name: Build Windows EXE

on:
  push:
    branches: [main]
    paths:
      - 'invoice_tool/invoice_extractor.py'
      - 'invoice_tool/invoice_extractor_windows.spec'
      - 'invoice_tool/requirements.txt'
      - '.github/workflows/windows-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Download and extract 7z standalone (extra package)
        shell: bash
        run: |
          # 7z2301-extra.7z 解压后直接得到 7z.exe + 7z.dll 等文件
          mkdir -p invoice_tool/7z
          curl -L -o invoice_tool/7z/7z-extra.7z https://7-zip.org/a/7z2301-extra.7z
          7z x invoice_tool/7z/7z-extra.7z -oinvoice_tool/7z -y
          rm invoice_tool/7z/7z-extra.7z
          ls -la invoice_tool/7z/

      - name: Verify 7z.exe
        shell: bash
        run: |
          if [ -f invoice_tool/7z/7z.exe ]; then
            echo "SUCCESS: 7z.exe found"
          else
            echo "FAIL: 7z.exe not found"
            ls -la invoice_tool/7z/
            exit 1
          fi

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r invoice_tool/requirements.txt

      - name: Build EXE
        run: pyinstaller invoice_tool/invoice_extractor_windows.spec --noconfirm --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: invoice-tool-win-${{ github.run_number }}
          path: invoice_tool/dist/InvoiceTool.exe
          retention-days: 14
