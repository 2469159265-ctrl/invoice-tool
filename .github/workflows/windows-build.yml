name: Build Windows EXE

on:
  push:
    branches: [main]
    paths:
      - 'invoice_tool/invoice_extractor.py'
      - 'invoice_tool/invoice_extractor_windows.spec'
      - 'invoice_tool/requirements.txt'
      - '.github/workflows/windows-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install 7-Zip via winget
        run: |
          # 用 winget 安装 7-Zip（winget 在 windows-latest 上预装）
          winget install --id 7zip.7zip --version 2408 --silent --accept-package-agreements --accept-source-agreements
          # 验证安装
          "C:\Program Files\7-Zip\7z.exe" || exit 1

      - name: Download 7z extra package (standalone files for bundling)
        run: |
          # 下载 extra 包，解压出独立文件（7z.exe + 7z.dll 等）
          curl -L -o 7z-extra.7z https://7-zip.org/a/7z2408-extra.7z
          "C:\Program Files\7-Zip\7z.exe" x 7z-extra.7z -oinvoice_tool/7z -y
          rm -f 7z-extra.7z
          ls -la invoice_tool/7z/7z.exe

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r invoice_tool/requirements.txt

      - name: Build EXE
        run: pyinstaller invoice_tool/invoice_extractor_windows.spec --noconfirm --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: invoice-tool-win-${{ github.run_number }}
          path: invoice_tool/dist/InvoiceTool.exe
          retention-days: 14
