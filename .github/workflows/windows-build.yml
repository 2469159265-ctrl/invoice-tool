name: Build Windows EXE

on:
  push:
    branches: [main]
    paths:
      - 'invoice_tool/invoice_extractor.py'
      - 'invoice_tool/invoice_extractor_windows.spec'
      - 'invoice_tool/requirements.txt'
      - '.github/workflows/windows-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Download and extract 7z extra package
        run: |
          curl -L -o 7z-extra.7z https://7-zip.org/a/7z2301-extra.7z
          if not exist "invoice_tool\7z" mkdir "invoice_tool\7z"
          "C:\Program Files\7-Zip\7z.exe" x 7z-extra.7z -oinvoice_tool\7z -y
          del 7z-extra.7z

      - name: Verify 7z.exe bundled
        run: |
          if exist "invoice_tool\7z\7z.exe" (
            echo SUCCESS: invoice_tool\7z\7z.exe
          ) else (
            echo FAIL
            dir invoice_tool\7z\
            exit /b 1
          )

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r invoice_tool/requirements.txt

      - name: Build EXE
        run: pyinstaller invoice_tool/invoice_extractor_windows.spec --noconfirm --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: invoice-tool-win-${{ github.run_number }}
          path: invoice_tool/dist/InvoiceTool.exe
          retention-days: 14
