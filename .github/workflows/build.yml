name: Build Windows EXE
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Build EXE
        run: |
          pyinstaller invoice_extractor_windows.spec --noconfirm --clean
      
      - name: Package
        run: Compress-Archive -Path "dist/发票识别工具.exe" -DestinationPath "发票识别工具-win64.zip" -Force
      
      - uses: actions/upload-artifact@v4
        with:
          name: invoice-tool-win64
          path: 发票识别工具-win64.zip
          retention-days: 14
